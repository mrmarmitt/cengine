name: CI do Projeto cengine

on:
  push:
    branches: 
      - main
      - 'release/**'
      - 'feature/**'
  pull_request:
    branches: 
      - main
      - 'release/**'

jobs:
  build-and-test:
    runs-on: ubuntu-22.04 # Versão LTS mais recente com C++23

    steps:
    - name: Checkout do Código
      uses: actions/checkout@v4

    - name: Configurar o Ambiente de Build com CMake
      run: |
        cmake -S . -B build

    - name: Buildar o Projeto
      run: cmake --build build

    - name: Rodar os Testes
      run: |
        cd build
        ctest --output-on-failure